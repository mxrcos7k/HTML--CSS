<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* SELETORES PERSONALIZADOS
        #  = id
        .  = class
        :  = pseudo-class
        :: = pseudo-element
        >  = children
        */

        body{
            font-family: 'Times New Roman', Times,sans-serif;
        }

        a{
            color: rgb(47, 0, 255);
            text-decoration:none;
            font-size: 20px;
            font-weight: bold;
        }

         a:visited{
            color: rgb(134, 8, 8);
        }

        a:hover{
            text-decoration: underline black;
        }

        a:active{
            color: black;
        }

        a::after{
            content:' [link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgrey;
        }

        .especial{
            background-color: rgb(217, 130, 130);
        }

        .especial::before{
            content: '→ ';
            color: black;
        }

        .especial::after{
            content:'  ←';
            color: black;
        }
    </style>
</head>
<body>
    <h1 style="font-size: 40px;">Personalizando Links</h1>
    <ul>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank" rel="external">Repositório do Github</a></li>

        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank" rel="external" class="especial">Canal do Youtube</a></li>

        <li><a href="https://www.cursoemvideo.com/" target="_blank" rel="external">Site do Curso em Video</a></li>
    </ul>
</body>
</html>
