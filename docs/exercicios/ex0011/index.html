<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
        <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>

        <picture>
            <source media="(max-width:750px )" srcset="imagens/fotopequena.png" type="image/png">

            <source media="(max-width:1050px )" srcset="imagens/fotomedia.png" 
            type="image/png">

            <img src="imagens/fotogrande.png" alt="imagem flexivel">
        </picture>

        <h1>Reproduzindo áudio</h1>
            <p>Vamos aprender a reproduzir audios em HTML5.</p>
            <audio preload="metadata" controls>
                <source src="midia/exercicios_modulo-01_ex011_midia_happy-mistake.mp3" type="audio/mpeg ">
            </audio>


</body>
</html>
