<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com html5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu próprio servidor</p>

     <video loop poster="../ex008/vegeta majin.jpg" src="midia/Meuvideo2.mp4" width="500" controls></video>

     <video loop controls width="500">
        <source src="midia/Meuvideo2.mp4"type="video/mp4">
        <p>seu navegador nao é compativel com o video</p>
     </video>
     
     <h1>Inserindo videos do youtube</h1>
     <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=BQCQ84kYfCpQ000V" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

     
</body>
</html>
